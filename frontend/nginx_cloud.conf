server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Important DNS resolver for dynamic Google Cloud Run host names
    resolver 8.8.8.8 ipv6=off;

    # Proxy all backend routes to the Public Cloud Run Backend
    location ~* ^/(auth|analytics|users|customers|projects|invoices|leads|milestones|line-items|xero|static|token|reports|attachments|locations|tasks|task-notes|task-events|events|calendar|expenses|emails|system|notifications|ws|ai|search|pto|messages)(/.*)?$ {
        # Define the cloud run url in a variable resolving with the exact URI path so NGINX doesn't evaluate it uniquely to root (/)
        set $backend "https://pace-backend-611176160748.us-east4.run.app$request_uri";
        proxy_pass $backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host pace-backend-611176160748.us-east4.run.app;
        
        # SNI config required for Google Cloud Native Load Balancers
        proxy_ssl_server_name on;
        proxy_ssl_name pace-backend-611176160748.us-east4.run.app;

        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static assets and SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Kill aggressive index.html caching
        location ~* \.html?$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
    }
}
