server {
    listen 80;
    server_name _;
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Proxy all backend routes
    location ~* ^/(auth|analytics|users|customers|projects|invoices|leads|milestones|line-items|xero|static|token|reports|attachments|locations|tasks|task-notes|task-events|events|calendar|expenses|emails|system|notifications|ws|ai|search|pto|messages)(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets and SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Kill aggressive index.html caching immediately globally to force JS updates cleanly
        location ~* \.html?$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Proxy all backend routes
    location ~* ^/(auth|analytics|users|customers|projects|invoices|leads|milestones|line-items|xero|static|token|reports|attachments|locations|tasks|task-notes|task-events|events|calendar|expenses|emails|system|notifications|ws|ai|search|pto|messages)(/.*)?$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static assets and SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Kill aggressive index.html caching immediately globally to force JS updates cleanly
        location ~* \.html?$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
            add_header Pragma "no-cache";
        }
    }
}
