steps:
  # 1. Build frontend React static files
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm install --legacy-peer-deps
        npm run build

  # 2. Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-backend:latest'
      - '.'

  # 3. Build Frontend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'frontend'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile_Cloud'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-frontend:latest'
      - '.'

  # 3.5 Push Images to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-backend:latest']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-frontend:latest']

  # 4. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pace-backend'
      - '--image'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-backend:latest'
      - '--region'
      - 'us-east4'
      - '--allow-unauthenticated' # Remove this flag if you want your backend API to be private

  # 5. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pace-frontend'
      - '--image'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-frontend:latest'
      - '--region'
      - 'us-east4'
      - '--allow-unauthenticated'

# Automatically push the built images to Artifact Registry
images:
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-backend:latest'
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/pace-docker/pace-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
